<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click-counter-Game</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <video id="video" autoplay loop>
        <source src="https://cdn.pixabay.com/video/2021/11/17/98191-647151551_large.mp4">
    </video>
    <div class="container">
        <h1>Click Counter Game</h1>
        <p class="subtitle">Click as fast as you can</p>

        <!-- Score Display Section -->
        <div class="score-section">
            <div class="score-box">
                <h2>Current Score</h2>
                <div id="currentScore" class="score">0</div>
            </div>
            <div class="score-box">
                <h2>High Score</h2>
                <div id="highScore" class="score">0</div>
            </div>
        </div>

        <!-- Timer Display -->
        <div class="timer-section">
            <h2>Time Remaining</h2>
            <div id="timer" class="timer">10</div>
        </div>

        <!-- Game Button -->
        <div class="button-section">
            <button id="clickButton" class="click-btn" disabled>
                Click Me!
            </button>
            <button id="startButton" class="start-btn">
                Start Game
            </button>
            <button id="resetButton" class="reset-btn">
                Reset High Score
            </button>
            <div class="new">
             <button id="pauseButton" class="pause-btn">
                Pause
            </button>
            <button id="resumeButton" class="resume-btn" disabled>
                Resume
            </button>
            </div>

        </div>

        <!-- Game Status Message -->
        <div id="statusMessage" class="status-message">
            Click "Start Game" to begin!
        </div>
    </div>

    <script src="./index.js"></script>
</body>
</html>
