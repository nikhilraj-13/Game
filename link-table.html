<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Project Table</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        text-align: center;
    }

    h2 {
        margin: 30px 0 20px;
    }

    .table-container {
        width: 80%;
        margin: auto;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead {
        background-color: #1e73be;
        color: white;
    }

    th, td {
        padding: 15px;
        text-align: center;
    }

    th {
        font-weight: bold;
        letter-spacing: 1px;
    }

    tbody tr:nth-child(odd) {
        background-color: #f2f2f2;
    }

    tbody tr:nth-child(even) {
        background-color: #e6e9ed;
    }

    a {
        text-decoration: none;
        color: #1e73be;
        font-weight: 500;
    }

    a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<h2>Please read the README.md file once.</h2>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>S. NO.</th>
                <th>NAME</th>
                <th>DEMO LINK</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Click-counter</td>
                <td><a href="#">Visit Game</a></td>
            </tr>
            <tr>
                <td>2</td>
                <td>Memory Flip Card</td>
                <td><a href="#">Visit Game</a></td>
            </tr>
            <tr>
                <td>3</td>
                <td>Tic Tac Toe</td>
                <td><a href="#">Visit Game</a></td>
            </tr>
            <tr>
                <td>4</td>
                <td>Typing Speed</td>
                <td><a href="#">Visit Game</a></td>
            </tr>
            <tr>
                <td>5</td>
                <td>Whack A Mole</td>
                <td><a href="#">Visit Game</a></td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
